name: E2E Tests (Detox)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'modules/dns-native/**'
      - 'ios/**'
      - 'android/**'
      - 'app.config.ts'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-ios:
    name: iOS E2E Tests (iPhone 15 Simulator)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.19.1
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup iOS environment
        run: |
          sudo xcode-select --switch /Applications/Xcode.app
          xcodebuild -version
          xcrun simctl list devices available

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build app for Detox (iOS Release)
        run: npm run detox:build:ios
        timeout-minutes: 30

      - name: Boot iOS Simulator (iPhone 15)
        run: |
          xcrun simctl boot "iPhone 15" || echo "Simulator already booted"
          xcrun simctl bootstatus "iPhone 15" -b

      - name: Run Detox E2E tests (iOS)
        run: npm run detox:test:ios -- --record-logs all
        timeout-minutes: 20

      - name: Upload test artifacts (screenshots, logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-ios-${{ github.run_number }}
          path: |
            artifacts/**/*.png
            artifacts/**/*.log
            artifacts/**/*.mp4
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-ios-${{ github.run_number }}
          path: e2e/test-results/
          retention-days: 7

  e2e-android:
    name: Android E2E Tests (Pixel 8 API 35 Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.19.1
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Setup Android environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK Platform 35 & Build Tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "system-images;android-35;google_apis;x86_64"

      - name: Create AVD (Pixel 8 API 35)
        run: |
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --force \
            --name Pixel_8_API_35 \
            --package "system-images;android-35;google_apis;x86_64" \
            --device "pixel_8"

      - name: Build app for Detox (Android Release)
        run: npm run detox:build:android
        timeout-minutes: 30

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_8
          avd-name: Pixel_8_API_35
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            npm run detox:test:android -- --record-logs all

      - name: Upload test artifacts (screenshots, logs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts-android-${{ github.run_number }}
          path: |
            artifacts/**/*.png
            artifacts/**/*.log
            artifacts/**/*.mp4
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-android-${{ github.run_number }}
          path: e2e/test-results/
          retention-days: 7

  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-ios, e2e-android]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.e2e-ios.result }}" != "success" ] || [ "${{ needs.e2e-android.result }}" != "success" ]; then
            echo "❌ E2E tests failed"
            echo "iOS: ${{ needs.e2e-ios.result }}"
            echo "Android: ${{ needs.e2e-android.result }}"
            exit 1
          else
            echo "✅ All E2E tests passed"
            echo "iOS: ${{ needs.e2e-ios.result }}"
            echo "Android: ${{ needs.e2e-android.result }}"
          fi

      - name: Post summary comment (on PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const iosResult = '${{ needs.e2e-ios.result }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const androidResult = '${{ needs.e2e-android.result }}' === 'success' ? '✅ Passed' : '❌ Failed';

            const body = `## E2E Test Results\n\n| Platform | Status |\n|----------|--------|\n| iOS (iPhone 15 Simulator) | ${iosResult} |\n| Android (Pixel 8 API 35) | ${androidResult} |\n\n**Test Suites:** onboarding, chat-lifecycle, dns-transports, error-handling, native-module, smoke\n\n[View workflow run](${context.payload.pull_request.html_url}/checks)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
