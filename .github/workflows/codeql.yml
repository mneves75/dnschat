name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
  schedule:
    # Weekly scan on Sundays at 1:30 AM UTC
    - cron: '30 1 * * 0'
  workflow_dispatch:  # Allow manual triggers

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        # TypeScript includes JavaScript analysis
        languages: typescript
        # Extended security queries for comprehensive scanning
        queries: security-extended,security-and-quality
        # Exclude vendored documentation and build artifacts
        paths-ignore:
          - 'docs/REF_DOC/**'
          - 'node_modules/**'
          - 'dist/**'
          - 'build/**'
          - 'ios/build/**'
          - 'android/build/**'
          - '.expo/**'

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:typescript"
        # Upload results even if there are findings
        upload: true
