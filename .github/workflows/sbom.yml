name: "SBOM Generation"

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write  # Required to attach files to releases

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate CycloneDX SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm \
            --output-file sbom-cyclonedx.json \
            --spec-version 1.5 \
            --output-reproducible

      - name: Generate SPDX SBOM
        run: |
          npx @spdx/tools generate \
            --outputFile sbom-spdx.json \
            --format json

      - name: Validate CycloneDX SBOM
        run: |
          # Basic validation - check file exists and is valid JSON
          if [ ! -f sbom-cyclonedx.json ]; then
            echo "Error: CycloneDX SBOM not generated"
            exit 1
          fi

          # Validate JSON structure
          if ! jq empty sbom-cyclonedx.json 2>/dev/null; then
            echo "Error: Invalid JSON in CycloneDX SBOM"
            exit 1
          fi

          echo "CycloneDX SBOM validated successfully"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90
          compression-level: 9

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sbom-cyclonedx.json
            sbom-spdx.json
